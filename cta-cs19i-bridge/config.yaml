name: CTA CS19i Bridge
version: "0.0.4"
slug: cta_cs19i_bridge
description: CTA CS19i → MQTT bridge (sensors + Start Heating button) + log tables
arch:
  - aarch64
  - amd64
  - armv7
  - i386
startup: services
boot: auto
init: false
homeassistant: true

options:
  hostname: 10.80.23.11
  controller_port: 8214
  controller_password: "999990"
  poll_interval: 30

  demand_delta: 0.2
  demand_delta_c: 5

  discovery_prefix: homeassistant
  state_base_topic: cta_cs19i

  mqtt_host: core-mosquitto
  mqtt_port: 1883
  mqtt_user: "mqtt_user"
  mqtt_pass: "mqtt_password"

  mqtt_username: "mqtt_user"
  mqtt_password: "mqtt_password"

  # IMPORTANT: your stored value is boolean True, so schema must accept bool
  log_pages: true
  log_changes_only: false

schema:
  hostname: str
  controller_port: int
  controller_password: password
  poll_interval: int

  demand_delta: float
  demand_delta_c: int?

  discovery_prefix: str
  state_base_topic: str

  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_pass: password

  mqtt_username: str?
  mqtt_password: password?

  log_pages: bool
  log_changes_only: bool