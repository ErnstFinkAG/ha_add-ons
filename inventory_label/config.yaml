name: Inventory Label
version: "0.3.0"
slug: inventory_label
panel_title: Inventory Label
panel_icon: mdi:label-outline
description: Configure shared inventory label profiles and fields for printing and preview.
url: https://example.invalid/inventory-label
arch:
  - aarch64
  - amd64
  - armv7
init: false
ingress: true
ingress_port: 8099
panel_admin: true
startup: services
boot: auto
map:
  - type: addon_config
    read_only: false
  - type: share
    read_only: false
ports:
  8099/tcp: null
ports_description:
  8099/tcp: Local debug port when ingress is not used
options:
  labelprofiles: []
  labelfields: []
schema:
  labelprofiles:
    - id: "match(^[a-z0-9]+$)"
      name: str
      printerhost: str
      printer_port: port
      printer_dpi: "int(1,)"
      label_width_mm: float
      label_length_mm: float
      top_margin_mm: float
      left_margin_mm: float
      print_rotation: "list(0|90|180|270)"
      qr_code_quietzone_modules: "list(0|1|2|3|4)"
      qr_code_error_correction: "list(H|Q|M|L)"
      show_in_preview: bool
  labelfields:
    - id: "match(^[a-z0-9]+$)"
      name: str
      fontsize: "int(1,)"
      default_value: "str?"
      valuelist:
        - str
      logo: bool
      logo_path: "str?"
      heading: "str?"
      fontfamily: "str?"
      position: "list(text|footer)"
      max_lines: "int(1,)"
      footer_margin_bottom: float
      bold: bool
      italic: bool
      underline: bool
      print_by_default: bool
      numbers_only: bool
      append_current_date: bool
      default_for_rendering_qr_code: bool
