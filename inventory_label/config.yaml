name: "Inventory Label"
version: "0.1.96"
slug: "inventory_label"
description: >-
  Print large QR-code labels to a networked Zebra ZT420/ZT421 with live PNG preview,
  English/German UI, label profiles configured in the add-on settings, and per-label
  field management in the web UI.
url: "https://github.com/ErnstFinkAG/ha_add-ons/tree/main/inventory_label"
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: "mdi:label"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
options:
  ui_language: "de"
  label_profiles:
    - id: "standard"
      name: "Standard"
      printer_host: ""
      printer_port: 9100
      printer_dpi: 203
      print_offset_x_mm: 0.0
      print_offset_y_mm: 0.0
      label_width_mm: 170
      label_height_mm: 305
      qr_size_mm: 170
      top_margin_mm: 0
      footer_bottom_margin_mm: 0
      print_rotation_degrees: 0
      qr_quiet_zone_modules: 3
      qr_error_correction: "M"
      printable_area_box_enabled: false
      printable_area_box_margin_mm: 5.0
schema:
  ui_language: "list(de|en)"
  label_profiles:
    - id: str
      name: str
      printer_host: "str?"
      printer_port: "port?"
      printer_dpi: int
      print_offset_x_mm: float
      print_offset_y_mm: float
      label_width_mm: float
      label_height_mm: float
      qr_size_mm: float
      top_margin_mm: float
      footer_bottom_margin_mm: float
      print_rotation_degrees: "list(0|90|270)"
      qr_quiet_zone_modules: int
      qr_error_correction: "list(L|M|Q|H)"
      printable_area_box_enabled: bool
      printable_area_box_margin_mm: float
