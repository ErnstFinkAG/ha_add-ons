name: "Inventory Label"
version: "0.1.56"
slug: "inventory_label"
description: >-
  Print large QR-code labels to a networked Zebra ZT420/ZT421 with live PNG preview,
  English/German UI, label profiles configured in the add-on settings, global field
  management in the web UI, and multi-profile preview cards.
url: "https://github.com/ErnstFinkAG/ha_add-ons/tree/main/inventory_label"
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: "mdi:label"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
options:
  ui_language: "de"
  label_profiles: []
schema:
  ui_language: "list(de|en)"
  label_profiles:
    - id: str
      name: str
      printer_host: "str?"
      printer_port: "port?"
      printer_dpi: int
      label_width_mm: float
      label_height_mm: float
      qr_size_mm: float
      top_margin_mm: float
      footer_bottom_margin_mm: float
      print_rotation_degrees: "list(0|90|270)"
      qr_quiet_zone_modules: int
      qr_error_correction: "list(L|M|Q|H)"
      show_in_preview: bool?
