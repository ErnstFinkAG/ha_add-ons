name: "Inventory Label"
version: "0.1.34"
slug: "inventory_label"
description: >-
  Print large QR-code project or inventory labels to a Zebra ZT420/ZT421 with live PNG preview, English/German UI, optional 90°/270° rotated layout, sign-off suggestions, optional separate weight, per-field styling, config-tab label profiles selectable in the UI, on-screen custom text blocks with per-block styling, optional footer with automatic current date, and TCP 9100 printing
url: "https://github.com/ErnstFinkAG/ha_add-ons/tree/main/inventory_label"
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: "mdi:label"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
options:
  ui_language: "de"
  printer_host: "10.50.20.12"
  printer_port: 9100
  label_width_mm: 170
  label_height_mm: 305
  qr_size_mm: 170
  top_margin_mm: 0
  print_rotation_degrees: 0
  field1_label: "Projektnummer"
  field2_label: "Projektname"
  field3_label: "Element"
  field1_default_value: "250001"
  field2_default_value: "EFH Huggentobbler Biel"
  field3_default_value: "DE1"
  field1_alignment: "center"
  field2_alignment: "center"
  field3_alignment: "center"
  field1_font_family: "sans"
  field2_font_family: "sans"
  field3_font_family: "sans"
  field1_font_size_mm: 18
  field2_font_size_mm: 13
  field3_font_size_mm: 18
  field1_bold: true
  field2_bold: false
  field3_bold: false
  field1_italic: false
  field2_italic: false
  field3_italic: false
  field1_underline: false
  field2_underline: false
  field3_underline: false
  sign_off_label: "Sign-off"
  sign_off_default_value: ""
  sign_off_options: ""
  sign_off_alignment: "center"
  sign_off_font_family: "sans"
  sign_off_font_size_mm: 7
  sign_off_bold: false
  sign_off_italic: false
  sign_off_underline: false
  weight_label: "Weight (kg)"
  weight_default_value: ""
  weight_alignment: "center"
  weight_font_family: "sans"
  weight_font_size_mm: 7
  weight_bold: false
  weight_italic: false
  weight_underline: false
  footer_label: "Footer"
  footer_default_value: "Ernst Fink AG, Schorenweg 144, 4585 Biezwil"
  footer_alignment: "center"
  footer_font_family: "sans"
  footer_font_size_mm: 5
  footer_bottom_margin_mm: 0
  footer_bold: false
  footer_italic: false
  footer_underline: false
  qr_value_template: "{text1 - text2}"
  qr_quiet_zone_modules: 3
  qr_error_correction: "M"
  label_profiles: []
