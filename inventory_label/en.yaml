configuration:
  ui_language:
    name: UI language
    description: Language used in the add-on web UI.
  label_profiles:
    name: Label profiles
    description: Create one entry per label profile. Global field definitions are managed once in the add-on web UI and apply to all label profiles.
    fields:
      id:
        name: Profile ID
        description: Internal unique ID for the label profile.
      name:
        name: Profile name
        description: Name shown in the add-on UI.
      printer_host:
        name: Printer host
        description: IP address or host name of the network printer.
      printer_port:
        name: Printer port
        description: Raw TCP port of the printer, usually 9100.
      printer_dpi:
        name: Printer DPI
        description: Printer resolution used for rendering and preview export.
      label_width_mm:
        name: Label width (mm)
        description: Physical width of the label.
      label_height_mm:
        name: Label height (mm)
        description: Physical height of the label.
      qr_size_mm:
        name: QR size (mm)
        description: Printed QR size.
      top_margin_mm:
        name: Top margin (mm)
        description: Print-only top offset. It follows the label orientation, so top stays top even on rotated labels.
      left_margin_mm:
        name: Left margin (mm)
        description: Print-only left offset. It follows the label orientation, so left stays left even on rotated labels.
      text_block_margin_left_mm:
        name: Text block margin left (mm)
        description: Print-only extra left offset for the text block. This shifts text content to the right.
      footer_bottom_margin_mm:
        name: Footer bottom margin (mm)
        description: Print-only bottom offset for footer text. Preview ignores profile margin settings.
      print_rotation_degrees:
        name: Print rotation
        description: Rotation of the rendered label.
      qr_quiet_zone_modules:
        name: QR quiet zone
        description: Quiet zone in QR modules.
      qr_error_correction:
        name: QR error correction
        description: QR error correction level.
      show_in_preview:
        name: Show in preview
        description: Enable this profile in the web UI multi-preview section.
