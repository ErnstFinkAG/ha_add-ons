configuration:
  ui_language:
    name: UI-Sprache
    description: Sprache der Add-on-Weboberfläche.
  label_profiles:
    name: Etikettenprofile
    description: Erstelle pro Label ein eigenes Profil. Felddefinitionen werden im Add-on-Web-UI pro ausgewähltem Label verwaltet.
    fields:
      id:
        name: Profil-ID
        description: Interne eindeutige ID des Etikettenprofils.
      name:
        name: Profilname
        description: Name, der im Add-on angezeigt wird.
      printer_host:
        name: Drucker-Host
        description: IP-Adresse oder Hostname des Netzwerkdruckers.
      printer_port:
        name: Drucker-Port
        description: Raw-TCP-Port des Druckers, normalerweise 9100.
      label_width_mm:
        name: Labelbreite (mm)
        description: Physische Breite des Labels.
      label_height_mm:
        name: Labelhöhe (mm)
        description: Physische Höhe des Labels.
      qr_size_mm:
        name: QR-Größe (mm)
        description: Gedruckte QR-Größe.
      top_margin_mm:
        name: Oberer Rand (mm)
        description: Nur für den Druck genutzter oberer Abstand des gerenderten Inhalts.
      left_margin_mm:
        name: Linker Rand (mm)
        description: Nur für den Druck genutzter linker Abstand des gerenderten Inhalts.
      text_block_margin_left_mm:
        name: Textblock-Rand links (mm)
        description: Zusätzlicher linker Druck-Abstand nur für den Textblock.
      footer_bottom_margin_mm:
        name: Footer-Unterrand (mm)
        description: Nur für den Druck genutzter unterer Abstand für Footer-Text.
      show_in_preview:
        name: In Vorschau anzeigen
        description: Dieses Etikettenprofil im Vorschaubereich der Weboberfläche anzeigen.
      print_rotation_degrees:
        name: Druckdrehung
        description: Drehung des gerenderten Labels.
      qr_quiet_zone_modules:
        name: QR-Ruherand
        description: Quiet Zone in QR-Modulen.
      qr_error_correction:
        name: QR-Fehlerkorrektur
        description: Fehlerkorrekturstufe des QR-Codes.
