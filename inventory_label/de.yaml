configuration:
  ui_language:
    name: UI-Sprache
    description: Sprache der Add-on-Weboberfläche.
  label_profiles:
    name: Etikettenprofile
    description: Erstelle vor dem ersten Start mindestens ein Etikettenprofil. Die globalen Felddefinitionen werden einmalig in der Add-on-Weboberfläche verwaltet und gelten für alle Profile.
    fields:
      id:
        name: Profil-ID
        description: Interne eindeutige ID des Etikettenprofils.
      name:
        name: Profilname
        description: Name, der im Add-on angezeigt wird.
      printer_host:
        name: Drucker-Host
        description: IP-Adresse oder Hostname des Netzwerkdruckers.
      printer_port:
        name: Drucker-Port
        description: Raw-TCP-Port des Druckers, normalerweise 9100.
      printer_dpi:
        name: Drucker-DPI
        description: Druckerauflösung für Rendering und Vorschau-Export.
      label_width_mm:
        name: Labelbreite (mm)
        description: Physische Breite des Labels.
      label_height_mm:
        name: Labelhöhe (mm)
        description: Physische Höhe des Labels.
      qr_size_mm:
        name: QR-Größe (mm)
        description: Gedruckte QR-Größe. Mit 0 wird der QR-Code für dieses Etikettenprofil deaktiviert.
      top_margin_mm:
        name: Oberer Rand (mm)
        description: Oberer Abstand vor dem QR-Code.
      footer_bottom_margin_mm:
        name: Footer-Unterrand (mm)
        description: Unterer Abstand für Footer-Text.
      print_shift_x_mm:
        name: Druckverschiebung X (mm)
        description: Verschiebt den gesamten gedruckten Labelinhalt in mm nach links oder rechts. Positiv verschiebt nach rechts, negativ nach links. Die Vorschau bleibt unverändert.
      print_shift_y_mm:
        name: Druckverschiebung Y (mm)
        description: Verschiebt den gesamten gedruckten Labelinhalt in mm nach oben oder unten. Positiv verschiebt nach unten, negativ nach oben. Die Vorschau bleibt unverändert.
      print_rotation_degrees:
        name: Druckdrehung
        description: Drehung des gerenderten Labels.
      qr_quiet_zone_modules:
        name: QR-Ruherand
        description: Quiet Zone in QR-Modulen.
      qr_error_correction:
        name: QR-Fehlerkorrektur
        description: Fehlerkorrekturstufe des QR-Codes.
      show_in_preview:
        name: In Vorschau zeigen
        description: Aktiviert dieses Profil im Mehrfach-Vorschaubereich der Weboberfläche.
