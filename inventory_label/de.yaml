configuration:
  ui_language:
    name: UI-Sprache
    description: Sprache der Add-on-Weboberfläche.
  label_profiles:
    name: Etikettenprofile
    description: Erstelle pro Label ein eigenes Profil. Felddefinitionen sind global und werden einmalig im Add-on-Web-UI verwaltet.
    fields:
      id:
        name: Profil-ID
        description: Interne eindeutige ID des Etikettenprofils.
      name:
        name: Profilname
        description: Name, der im Add-on angezeigt wird.
      printer_host:
        name: Drucker-Host
        description: IP-Adresse oder Hostname des Netzwerkdruckers.
      printer_port:
        name: Drucker-Port
        description: Raw-TCP-Port des Druckers, normalerweise 9100.
      show_in_preview:
        name: In Vorschau anzeigen
        description: Wenn aktiviert, erhält dieses Etikettenprofil eine eigene Vorschaukarte in der Weboberfläche.
      label_width_mm:
        name: Labelbreite (mm)
        description: Physische Breite des Labels.
      label_height_mm:
        name: Labelhöhe (mm)
        description: Physische Höhe des Labels.
      qr_size_mm:
        name: QR-Größe (mm)
        description: Gedruckte QR-Größe.
      top_margin_mm:
        name: Oberer Rand (mm)
        description: Nur für den Druck. Bleibt auch bei gedrehtem Label oben.
      left_margin_mm:
        name: Linker Rand (mm)
        description: Nur für den Druck. Bleibt auch bei gedrehtem Label links.
      text_block_margin_left_mm:
        name: Linker Textblock-Rand (mm)
        description: Zusätzlicher linker Rand nur für Textblöcke im Druck. Verschiebt Text nach rechts.
      footer_bottom_margin_mm:
        name: Footer-Unterrand (mm)
        description: Unterer Abstand für Footer-Text.
      print_rotation_degrees:
        name: Druckdrehung
        description: Drehung des gerenderten Labels.
      qr_quiet_zone_modules:
        name: QR-Ruherand
        description: Quiet Zone in QR-Modulen.
      qr_error_correction:
        name: QR-Fehlerkorrektur
        description: Fehlerkorrekturstufe des QR-Codes.
