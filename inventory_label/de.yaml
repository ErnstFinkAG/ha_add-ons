configuration:
  ui_language:
    name: UI-Sprache
    description: Sprache der Add-on-Weboberfläche.
  label_profiles:
    name: Etikettenprofile
    description: Erstelle pro Etikettenprofil einen Eintrag. Die globalen Felddefinitionen werden einmalig in der Add-on-Weboberfläche verwaltet und gelten für alle Profile.
    fields:
      id:
        name: Profil-ID
        description: Interne eindeutige ID des Etikettenprofils.
      name:
        name: Profilname
        description: Name, der im Add-on angezeigt wird.
      printer_host:
        name: Drucker-Host
        description: IP-Adresse oder Hostname des Netzwerkdruckers.
      printer_port:
        name: Drucker-Port
        description: Raw-TCP-Port des Druckers, normalerweise 9100.
      printer_dpi:
        name: Drucker-DPI
        description: Druckerauflösung für Rendering und Vorschau-Export.
      label_width_mm:
        name: Labelbreite (mm)
        description: Physische Breite des Labels.
      label_height_mm:
        name: Labelhöhe (mm)
        description: Physische Höhe des Labels.
      qr_size_mm:
        name: QR-Größe (mm)
        description: Gedruckte QR-Größe.
      top_margin_mm:
        name: Oberer Rand (mm)
        description: Nur Druck: oberer Abstand. Er folgt der Label-Ausrichtung, also bleibt oben auch bei gedrehten Labels oben.
      left_margin_mm:
        name: Linker Rand (mm)
        description: Nur Druck: linker Abstand. Er folgt der Label-Ausrichtung, also bleibt links auch bei gedrehten Labels links.
      text_block_margin_left_mm:
        name: Textblock-Rand links (mm)
        description: Nur Druck: zusätzlicher linker Abstand für den Textblock. Dadurch wird der Textblock nach rechts verschoben.
      footer_bottom_margin_mm:
        name: Footer-Unterrand (mm)
        description: Nur Druck: unterer Abstand für Footer-Text. Die Vorschau ignoriert Profil-Margins.
      print_rotation_degrees:
        name: Druckdrehung
        description: Drehung des gerenderten Labels.
      qr_quiet_zone_modules:
        name: QR-Ruherand
        description: Quiet Zone in QR-Modulen.
      qr_error_correction:
        name: QR-Fehlerkorrektur
        description: Fehlerkorrekturstufe des QR-Codes.
      show_in_preview:
        name: In Vorschau zeigen
        description: Aktiviert dieses Profil im Mehrfach-Vorschaubereich der Weboberfläche.
