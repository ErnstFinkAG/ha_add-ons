configuration:
  ui_language:
    name: UI-Sprache
    description: Sprache der Add-on-Weboberfläche.
  label_profiles:
    name: Etikettenprofile
    description: Erstelle pro Label ein eigenes Profil. Felddefinitionen werden im Add-on-Web-UI pro ausgewähltem Label verwaltet.
    fields:
      id:
        name: Profil-ID
        description: Interne eindeutige ID des Etikettenprofils.
      name:
        name: Profilname
        description: Name, der im Add-on angezeigt wird.
      printer_host:
        name: Drucker-Host
        description: IP-Adresse oder Hostname des Netzwerkdruckers.
      printer_port:
        name: Drucker-Port
        description: Raw-TCP-Port des Druckers, normalerweise 9100.
      printer_dpi:
        name: Drucker-DPI
        description: Druckauflösung in Punkten pro Zoll für dieses Etikettenprofil, zum Beispiel 203 oder 300.
      print_offset_x_mm:
        name: Druck-Offset X (mm)
        description: Horizontale Druckkalibrierung in Millimetern. Positive Werte verschieben den Druck nach rechts.
      print_offset_y_mm:
        name: Druck-Offset Y (mm)
        description: Vertikale Druckkalibrierung in Millimetern. Positive Werte verschieben den Druck nach unten.
      label_width_mm:
        name: Labelbreite (mm)
        description: Physische Breite des Labels.
      label_height_mm:
        name: Labelhöhe (mm)
        description: Physische Höhe des Labels.
      qr_size_mm:
        name: QR-Größe (mm)
        description: Gedruckte QR-Größe.
      top_margin_mm:
        name: Oberer Rand (mm)
        description: Oberer Abstand vor dem QR-Code.
      footer_bottom_margin_mm:
        name: Footer-Unterrand (mm)
        description: Unterer Abstand für Footer-Text.
      print_rotation_degrees:
        name: Druckdrehung
        description: Drehung des gerenderten Labels.
      qr_quiet_zone_modules:
        name: QR-Ruherand
        description: Quiet Zone in QR-Modulen.
      qr_error_correction:
        name: QR-Fehlerkorrektur
        description: Fehlerkorrekturstufe des QR-Codes.
      printable_area_box_enabled:
        name: Druckbereich-Rahmen
        description: Druckt einen Rahmen innerhalb der Labelkanten und zeigt ihn in der PNG-Vorschau rot an.
      printable_area_box_margin_mm:
        name: Druckbereich-Rahmen Abstand (mm)
        description: Abstand zu den Labelkanten für den Druckbereich-Rahmen und die QR-Positionierung.
