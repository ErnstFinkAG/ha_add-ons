configuration:
  labelprofiles:
    name: Etikettenprofile
    description: Erstelle druckergebundene Etikettenprofile für Vorschau und Druck.
    fields:
      id:
        name: ID
        description: Nur Kleinbuchstaben und Zahlen, keine Leerzeichen.
      name:
        name: Name
        description: Anzeigename des Etikettenprofils.
      printerhost:
        name: Druckerhost
        description: IP-Adresse oder Hostname des Druckers.
      printer_port:
        name: Druckerport
        description: TCP-Port des Druckers, normalerweise 9100.
      printer_dpi:
        name: Drucker-DPI
        description: Druckauflösung in DPI.
      label_width_mm:
        name: Etikettenbreite
        description: Breite in Millimetern.
      label_length_mm:
        name: Etikettenlänge
        description: Länge in Millimetern.
      top_margin_mm:
        name: Oberer Rand
        description: Oberer Rand in Millimetern.
      left_margin_mm:
        name: Linker Rand
        description: Linker Rand in Millimetern.
      print_rotation:
        name: Druckrotation
        description: Rotation in Grad.
      qr_code_quietzone_modules:
        name: QR-Ruhezone Module
        description: Ruhezone um den QR-Code in Modulen.
      qr_code_error_correction:
        name: QR-Fehlerkorrektur
        description: Fehlerkorrekturstufe des QR-Codes.
      show_in_preview:
        name: In Vorschau anzeigen
        description: Dieses Profil in der Vorschau verfügbar machen.
  labelfields:
    name: Etikettenfelder
    description: Erstelle Felder, die für alle Etikettenprofile gelten.
    fields:
      id:
        name: ID
        description: Nur Kleinbuchstaben und Zahlen, keine Leerzeichen.
      name:
        name: Name
        description: Anzeigename des Feldes.
      fontsize:
        name: Schriftgröße
        description: Textgröße für das Rendering.
      default_value:
        name: Standardwert
        description: Standardinhalt des Feldes.
      valuelist:
        name: Werteliste
        description: Erlaubte oder vorgeschlagene Werte.
      logo:
        name: Logo-Feld
        description: Dieses Feld als Logo-Platzhalter behandeln.
      logo_path:
        name: Logo-Pfad
        description: Relativer oder absoluter PNG-Pfad in einem gemappten Ordner.
      heading:
        name: Überschrift
        description: Optionale Überschrift des Feldes.
      fontfamily:
        name: Schriftfamilie
        description: Name der Schriftfamilie.
      position:
        name: Position
        description: Als Text oder Footer rendern.
      max_lines:
        name: Max. Zeilen
        description: Maximale Anzahl umgebrochener Zeilen.
      footer_margin_bottom:
        name: Footer-Abstand unten
        description: Abstand unter dem Footer in Millimetern.
      bold:
        name: Fett
        description: Text fett rendern.
      italic:
        name: Kursiv
        description: Text kursiv rendern.
      underline:
        name: Unterstrichen
        description: Text unterstrichen rendern.
      print_by_default:
        name: Standardmäßig drucken
        description: Dieses Feld standardmäßig drucken.
      numbers_only:
        name: Nur Zahlen
        description: Werte nur auf Ziffern beschränken.
      append_current_date:
        name: Aktuelles Datum anhängen
        description: Heutiges Datum im Format YYYY.MM.DD anhängen.
      default_for_rendering_qr_code:
        name: Standard für QR-Rendering
        description: Dieses Feld als Standardquelle für den QR-Inhalt verwenden.
