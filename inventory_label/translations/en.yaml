configuration:
  ui_language:
    name: UI language
    description: Language used in the add-on web UI.
  label_profiles:
    name: Label profiles
    description: Create one entry per label profile. Field definitions are managed in the add-on web UI for each selected label.
    fields:
      id:
        name: Profile ID
        description: Internal unique ID for the label profile.
      name:
        name: Profile name
        description: Name shown in the add-on UI.
      printer_host:
        name: Printer host
        description: Optional. IP address or host name of the network printer.
      printer_port:
        name: Printer port
        description: Optional. Raw TCP port of the printer, usually 9100.
      label_width_mm:
        name: Label width (mm)
        description: Physical width of the label.
      label_height_mm:
        name: Label height (mm)
        description: Physical height of the label.
      qr_size_mm:
        name: QR size (mm)
        description: Printed QR size.
      top_margin_mm:
        name: Top margin (mm)
        description: Top offset before placing the QR code.
      footer_bottom_margin_mm:
        name: Footer bottom margin (mm)
        description: Bottom offset for footer text. Default for new labels: 0 mm.
      print_rotation_degrees:
        name: Print rotation
        description: Rotation of the rendered label.
      qr_default_value:
        name: Default QR value
        description: Optional default QR payload.
      qr_quiet_zone_modules:
        name: QR quiet zone
        description: Quiet zone in QR modules.
      qr_error_correction:
        name: QR error correction
        description: QR error correction level.
