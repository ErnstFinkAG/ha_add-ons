configuration:
  labelprofiles:
    name: Label profiles
    description: Create printer-bound label profiles used for rendering and output.
    fields:
      id:
        name: ID
        description: Lowercase letters and digits only, no spaces.
      name:
        name: Name
        description: Friendly display name for the label profile.
      printerhost:
        name: Printer host
        description: Printer IP address or hostname.
      printer_port:
        name: Printer port
        description: Raw TCP printer port, usually 9100.
      printer_dpi:
        name: Printer DPI
        description: Printer resolution in dots per inch.
      label_width_mm:
        name: Label width
        description: Label width in millimeters.
      label_length_mm:
        name: Label length
        description: Label length in millimeters.
      top_margin_mm:
        name: Top margin
        description: Top margin in millimeters.
      left_margin_mm:
        name: Left margin
        description: Left margin in millimeters.
      print_rotation:
        name: Print rotation
        description: Rotation in degrees.
      qr_code_quietzone_modules:
        name: QR quiet zone modules
        description: Quiet zone around the QR code in modules.
      qr_code_error_correction:
        name: QR error correction
        description: QR error correction level.
      show_in_preview:
        name: Show in preview
        description: Whether this label profile is available in preview mode.
  labelfields:
    name: Label fields
    description: Create fields that are shared across all label profiles.
    fields:
      id:
        name: ID
        description: Lowercase letters and digits only, no spaces.
      name:
        name: Name
        description: Friendly field name.
      fontsize:
        name: Font size
        description: Text size used when rendering the field.
      default_value:
        name: Default value
        description: Default field value.
      valuelist:
        name: Value list
        description: Allowed or suggested values.
      logo:
        name: Logo field
        description: Treat this field as a logo placeholder.
      logo_path:
        name: Logo path
        description: Relative or absolute PNG path in a mapped folder.
      heading:
        name: Heading
        description: Optional heading shown with the field.
      fontfamily:
        name: Font family
        description: Font family name.
      position:
        name: Position
        description: Render as normal text or as footer content.
      max_lines:
        name: Max lines
        description: Maximum number of wrapped lines.
      footer_margin_bottom:
        name: Footer margin bottom
        description: Margin below footer content in millimeters.
      bold:
        name: Bold
        description: Render bold text.
      italic:
        name: Italic
        description: Render italic text.
      underline:
        name: Underline
        description: Render underlined text.
      print_by_default:
        name: Print by default
        description: Include this field in printing by default.
      numbers_only:
        name: Numbers only
        description: Restrict values to digits only.
      append_current_date:
        name: Append current date
        description: Append today's date in YYYY.MM.DD format.
      default_for_rendering_qr_code:
        name: Default for rendering QR code
        description: Use this field as the default QR value source.
