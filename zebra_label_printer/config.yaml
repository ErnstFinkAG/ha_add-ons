name: "Zebra Label Printer"
version: "0.1.7"
slug: "zebra_label_printer"
description: >-
  Print large QR-code project labels to a Zebra ZT420/ZT421 over TCP (port 9100)
url: "https://github.com/ErnstFinkAG/ha_add-ons/tree/main/zebra_label_printer"
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: "mdi:label"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
options:
  printer_host: "192.168.1.50"
  printer_port: 9100
  label_width_mm: 170
  label_height_mm: 305
  qr_size_mm: 150
  top_margin_mm: 5
  field1_label: "Text string 1"
  field2_label: "Text string 2"
  field3_label: "Text string 3"
  qr_value_template: "text1"
  qr_quiet_zone_modules: 4
  qr_error_correction: "M"
schema:
  printer_host: str
  printer_port: port
  label_width_mm: float
  label_height_mm: float
  qr_size_mm: float
  top_margin_mm: float
  field1_label: str
  field2_label: str
  field3_label: str
  qr_value_template: str
  qr_quiet_zone_modules: int
  qr_error_correction: str
