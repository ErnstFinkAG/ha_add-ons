name: QR Inventory
version: "0.4.5"
slug: qr_inventory
description: "Scan QR codes from an RTSPS/RTSP camera, map them to storage zones, and serve an overlay PNG via HTTP."
arch:
  - amd64
  - aarch64

startup: services
boot: auto
init: false

ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: "Overlay snapshot (/overlay.png or /<overlay_png_name>) + detections (/detections.json)"
webui: "http://[HOST]:[PORT:8099]/"

options:
  camera_mode: rtsps
  rtsp_url: ""
  interval_seconds: 60
  required_consistency: 3
  zones: "{}"
  tls_verify: false
  overlay_png_name: overlay.png

  # Zones only
  restrict_to_zones: false

  # Scan tuning
  use_preprocess: true
  try_invert: true
  roi_padding_px: 60
  roi_scale: 2.0
  roi_scales: "2.0,3.0,4.0"
  zone_extra_scales: "6.0,8.0,10.0"
  zone_max_scaled_dim: 2400
  zone_early_stop_score: 0.85

  # IMPORTANT: reject decoded quads that don’t really belong to the zone (stops conflicts)
  zone_quad_in_zone_min_ratio: 0.60

  adaptive_block_sizes: "21,35,51"

  # Decoders
  enable_zbar: true
  zbar_qrcode_only: true

  # Safe OpenCV fallback (subprocess)
  opencv_subprocess_fallback: true
  opencv_fallback_only_if_decode_failed: true
  opencv_fallback_timeout_s: 3.0

  # (optional) OpenCV in-process decode (not recommended)
  opencv_qr_enabled: false
  force_opencv_qr_on_musl: false

  # Overlay
  overlay_show_scores: true
  overlay_show_size_px: true
  overlay_show_candidate_reason: true
  overlay_show_zone_status: true
  overlay_show_candidates: true
  overlay_max_candidates: 40

  # Diagnostics
  stream_info_interval_minutes: 0
  debug_metrics: false
  debug_log_every: 1

schema:
  camera_mode: list(rtsp|rtsps)
  rtsp_url: str
  interval_seconds: int
  required_consistency: int
  zones: str
  tls_verify: bool
  overlay_png_name: str

  restrict_to_zones: bool

  use_preprocess: bool
  try_invert: bool
  roi_padding_px: int
  roi_scale: float
  roi_scales: str
  zone_extra_scales: str
  zone_max_scaled_dim: int
  zone_early_stop_score: float
  zone_quad_in_zone_min_ratio: float

  adaptive_block_sizes: str

  enable_zbar: bool
  zbar_qrcode_only: bool

  opencv_subprocess_fallback: bool
  opencv_fallback_only_if_decode_failed: bool
  opencv_fallback_timeout_s: float

  opencv_qr_enabled: bool
  force_opencv_qr_on_musl: bool

  overlay_show_scores: bool
  overlay_show_size_px: bool
  overlay_show_candidate_reason: bool
  overlay_show_zone_status: bool
  overlay_show_candidates: bool
  overlay_max_candidates: int

  stream_info_interval_minutes: int
  debug_metrics: bool
  debug_log_every: int