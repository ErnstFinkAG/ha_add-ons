name: QR Inventory
version: "0.6.5.0"
slug: qr_inventory
description: "Scan QR codes from one or more RTSPS/RTSP cameras, map them to storage zones, and serve per-camera overlay/debug endpoints via HTTP."
arch:
  - amd64
  - aarch64

startup: services
boot: auto
init: false

ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: "Overlay snapshot + debug endpoints"
webui: "http://[HOST]:[PORT:8099]/"

options:
  # Global defaults (used for each camera unless overridden)
  defaults:
    interval_s: 60
    required: 3
    restrict_to_zones: false
    log_level: info

  # GLOBAL: debug output for these zone names across all cameras (e.g. [A1, A2]).
  # Use ["*"] to debug all zones.
  debug_zones: []

  overlay_http_port: 8099
  overlay_route_prefix: /overlays
  frame_route_prefix: /frames

  mqtt:
    enabled: false
    host: ""
    port: 1883
    username: ""
    password: ""
    client_id: qr_inventory
    topic_prefix: qr_inventory
    discovery_prefix: homeassistant
    retain: true
    keepalive: 60

  # Multi-camera list (each camera has px zones; zones is JSON string mapping zone->rect_px)
  cameras: []


  # Decoder / overlay tuning (global, shared by all cameras)
  use_preprocess: true
  try_invert: true
  roi_padding_px: 60

  enable_cutout: true
  cutout_min_area: 500
  cutout_ar_lo: 0.6
  cutout_ar_hi: 1.4
  cutout_inner_pad_frac: 0.0
  cutout_border_frac: 0.2
  cutout_border_min_px: 16
  cutout_open_ksize: 3
  cutout_open_iter: 1

  cutout_close_ksize: 9
  cutout_close_iter: 2
  cutout_min_side_px: 24
  cutout_safety_pad_px: 2
  cutout_detect_enable: true
  cutout_detect_tighten: true
  cutout_detect_scales: "2.0,3.0,4.0"

  # For decode input: if a QR quad is detected (even if not decoded), force everything
  # outside the quad to pure white before running ZBar/OpenCV. This removes paper/
  # wall texture and gives a cleaner synthetic quiet-zone.
  cutout_whiten_outside_quad: true

  roi_scale: 2.0
  roi_scales: "2.0,3.0,4.0"
  zone_extra_scales: "6.0,8.0,10.0"
  zone_max_scaled_dim: 2400
  zone_early_stop_score: 0.85
  zone_quad_in_zone_min_ratio: 0.60

  adaptive_block_sizes: "21,35,51"

  enable_zbar: true
  zbar_qrcode_only: true

  opencv_subprocess_fallback: true
  opencv_fallback_timeout_s: 3.0
  opencv_fallback_attempts: 10

  overlay_show_scores: true
  overlay_show_size_px: true
  overlay_show_candidate_reason: true
  overlay_show_zone_status: true
  overlay_show_unresolved_quads: true

  overlay_fill_unresolved_gap: true
  overlay_fill_unresolved_alpha: 0.22

  overlay_alignment_enabled: false
  overlay_alignment_color: FFFFFF
  overlay_alignment_direction: both
  overlay_alignment_width: 2
  overlay_margin_enabled: false
  overlay_margin_px: 10

  detected_list_enabled: false
  detected_list_regex: ""
  detected_list_sort_order: asc
  zone_multi_value_separator: " | "

  stream_info_interval_minutes: 0

schema:
  defaults:
    interval_s: int
    required: int
    restrict_to_zones: bool
    log_level: list(trace|debug|info|warning|error)

  debug_zones:
    - match(^(\*|[A-Za-z0-9_-]+)$)

  overlay_http_port: port
  overlay_route_prefix: str
  frame_route_prefix: str

  mqtt:
    enabled: bool
    host: str?
    port: port
    username: str?
    password: str?
    client_id: str
    topic_prefix: str
    discovery_prefix: str
    retain: bool
    keepalive: int

  cameras:
    - id: match(^[A-Za-z0-9_-]+$)
      name: str?
      rtsp_url: str
      tls_verify: bool?
      enabled: bool?
      interval_s: int?
      required: int?
      restrict_to_zones: bool?
      zones: str


  # Decoder / overlay tuning
  use_preprocess: bool
  try_invert: bool
  roi_padding_px: int

  enable_cutout: bool
  cutout_min_area: int
  cutout_ar_lo: float
  cutout_ar_hi: float
  cutout_inner_pad_frac: float
  cutout_border_frac: float
  cutout_border_min_px: int
  cutout_open_ksize: int
  cutout_open_iter: int

  cutout_close_ksize: int
  cutout_close_iter: int
  cutout_min_side_px: int
  cutout_safety_pad_px: int
  cutout_detect_enable: bool
  cutout_detect_tighten: bool
  cutout_detect_scales: str
  cutout_whiten_outside_quad: bool

  roi_scale: float
  roi_scales: str
  zone_extra_scales: str
  zone_max_scaled_dim: int
  zone_early_stop_score: float
  zone_quad_in_zone_min_ratio: float

  adaptive_block_sizes: str

  enable_zbar: bool
  zbar_qrcode_only: bool

  opencv_subprocess_fallback: bool
  opencv_fallback_timeout_s: float
  opencv_fallback_attempts: int

  overlay_show_scores: bool
  overlay_show_size_px: bool
  overlay_show_candidate_reason: bool
  overlay_show_zone_status: bool
  overlay_show_unresolved_quads: bool

  overlay_fill_unresolved_gap: bool
  overlay_fill_unresolved_alpha: float

  overlay_alignment_enabled: bool
  overlay_alignment_color: match(^#?[A-Fa-f0-9]{6}$)
  overlay_alignment_direction: list(horizontal|vertical|both)
  overlay_alignment_width: int
  overlay_margin_enabled: bool
  overlay_margin_px: int

  detected_list_enabled: bool
  detected_list_regex: str?
  detected_list_sort_order: list(asc|desc)
  zone_multi_value_separator: str

  stream_info_interval_minutes: int
